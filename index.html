<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: Arial, sans-serif;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100vh;
    background: #1a1a2e;
    color: white;
  }
  h3 { margin-bottom: 8px; font-size: 18px; }
  p.sub { color: #aaa; font-size: 12px; margin-bottom: 30px; }
  #btn {
    padding: 14px 40px;
    font-size: 16px;
    border: none;
    border-radius: 12px;
    cursor: pointer;
    font-weight: bold;
    transition: all 0.3s;
    box-shadow: 0 4px 15px rgba(0,0,0,0.3);
  }
  .pausar { background: #e74c3c; color: white; }
  .retomar { background: #2ecc71; color: white; }
  #status { margin-top: 20px; font-size: 13px; color: #bbb; }
  #convinfo { margin-top: 8px; font-size: 11px; color: #555; }
  #loader { display: none; margin-top: 15px; color: #aaa; }
</style>
</head>
<body>
  <h3>🤖 Controle do Bot</h3>
  <p class="sub">iPhoneria Maracanaú</p>
  <button id="btn" class="pausar" onclick="toggleBot()" disabled>⏸️ Pausar Bot</button>
  <p id="status">⏳ Aguardando conversa...</p>
  <p id="convinfo"></p>
  <p id="loader">⏳ Processando...</p>

  <script>
    let convId = null;
    let pausado = false;

    // Escutar mensagens do Chatwoot (postMessage)
    window.addEventListener('message', function(event) {
      console.log('postMessage recebido:', JSON.stringify(event.data));

      const data = event.data;
      if (!data) return;

      // Formato 1: { conversation: { id: 123 } }
      if (data.conversation && data.conversation.id) {
        setConvId(data.conversation.id);
      }
      // Formato 2: { id: 123, type: 'conversation' }
      else if (data.id && data.type === 'conversation') {
        setConvId(data.id);
      }
      // Formato 3: { conversationId: 123 }
      else if (data.conversationId) {
        setConvId(data.conversationId);
      }
      // Formato 4: { currentConversationId: 123 }
      else if (data.currentConversationId) {
        setConvId(data.currentConversationId);
      }
      // Formato 5: direto como número ou string
      else if (data.conversation_id) {
        setConvId(data.conversation_id);
      }
    });

    // Tentar pegar da URL do pai via referrer
    try {
      const ref = document.referrer;
      console.log('Referrer:', ref);
      const match = ref.match(/conversation[s]?\/(\d+)/);
      if (match) {
        setConvId(match[1]);
      }
    } catch(e) {
      console.log('Erro referrer:', e);
    }

    // Pegar da URL atual
    const params = new URLSearchParams(window.location.search);
    const urlId = params.get('conversation_id');
    if (urlId && !urlId.includes('{') && !isNaN(urlId)) {
      setConvId(urlId);
    }

    // Solicitar dados ao Chatwoot pai
    setTimeout(() => {
      try {
        window.parent.postMessage({ type: 'REQUEST_CONVERSATION_DATA' }, '*');
        console.log('Solicitação enviada ao parent');
      } catch(e) {}
    }, 500);

    // Fallback — pegar ID da URL do Chatwoot no parent
    setTimeout(() => {
      if (!convId) {
        try {
          const parentHref = window.parent.location.href;
          const match = parentHref.match(/conversation[s]?\/(\d+)/);
          if (match) {
            setConvId(match[1]);
          }
        } catch(e) {
          console.log('Não conseguiu acessar parent URL (cross-origin esperado)');
        }
      }
    }, 1000);

    // Timeout final
    setTimeout(() => {
      if (!convId) {
        document.getElementById('status').innerText = '⚠️ ID não encontrado';
        document.getElementById('convinfo').innerText = 'Tente reabrir a aba';
        document.getElementById('btn').disabled = false;
      }
    }, 4000);

    function setConvId(id) {
      if (convId) return; // já tem ID
      convId = String(id);
      console.log('convId definido:', convId);
      document.getElementById('convinfo').innerText = 'Conversa #' + convId;
      document.getElementById('btn').disabled = false;
      checkStatus();
    }

    async function checkStatus() {
      if (!convId) return;
      try {
        const res = await fetch('https://iphoneriamaracanau.app.n8n.cloud/webhook/check-bot-status?conversation_id=' + convId);
        const data = await res.json();
        pausado = data.pausado;
        updateUI();
      } catch(e) {
        document.getElementById('status').innerText = '⚠️ Erro ao verificar status';
      }
    }

    function updateUI() {
      const btn = document.getElementById('btn');
      const status = document.getElementById('status');
      if (pausado) {
        btn.className = 'retomar';
        btn.innerText = '▶️ Retomar Bot';
        status.innerText = '🔴 Bot está PAUSADO';
      } else {
        btn.className = 'pausar';
        btn.innerText = '⏸️ Pausar Bot';
        status.innerText = '🟢 Bot está ATIVO';
      }
    }

    async function toggleBot() {
      if (!convId) {
        document.getElementById('status').innerText = '❌ ID não encontrado';
        return;
      }
      const btn = document.getElementById('btn');
      const loader = document.getElementById('loader');
      btn.disabled = true;
      loader.style.display = 'block';
      try {
        const res = await fetch('https://iphoneriamaracanau.app.n8n.cloud/webhook/toggle-bot', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ conversation_id: convId, pausar: !pausado })
        });
        const data = await res.json();
        if (data.ok) {
          pausado = !pausado;
          updateUI();
        } else {
          document.getElementById('status').innerText = '❌ ' + (data.erro || 'Erro desconhecido');
        }
      } catch(e) {
        document.getElementById('status').innerText = '❌ Erro ao executar';
      }
      btn.disabled = false;
      loader.style.display = 'none';
    }
  </script>
</body>
</html>
