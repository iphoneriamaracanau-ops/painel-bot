<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: Arial, sans-serif;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100vh;
    background: #1a1a2e;
    color: white;
  }
  h3 { margin-bottom: 8px; font-size: 18px; }
  p.sub { color: #aaa; font-size: 12px; margin-bottom: 30px; }
  #btn {
    padding: 14px 40px;
    font-size: 16px;
    border: none;
    border-radius: 12px;
    cursor: pointer;
    font-weight: bold;
    transition: all 0.3s;
    box-shadow: 0 4px 15px rgba(0,0,0,0.3);
  }
  .pausar { background: #e74c3c; color: white; }
  .retomar { background: #2ecc71; color: white; }
  #status { margin-top: 20px; font-size: 13px; color: #bbb; }
  #convinfo { margin-top: 8px; font-size: 11px; color: #555; }
  #loader { display: none; margin-top: 15px; color: #aaa; }
</style>
</head>
<body>
  <h3>🤖 Controle do Bot</h3>
  <p class="sub">iPhoneria Maracanaú</p>
  <button id="btn" class="pausar" onclick="toggleBot()" disabled>⏸️ Pausar Bot</button>
  <p id="status">⏳ Carregando...</p>
  <p id="convinfo"></p>
  <p id="loader">⏳ Processando...</p>

  <script>
    let convId = null;
    let pausado = false;

    window.addEventListener('message', function(event) {
      const raw = event.data;
      if (!raw) return;

      // O Chatwoot envia como STRING JSON
      let parsed = raw;
      if (typeof raw === 'string') {
        try { parsed = JSON.parse(raw); } catch(e) { return; }
      }

      // Formato confirmado: { event: "appContext", data: { conversation: { id: 140 } } }
      if (parsed.event === 'appContext' && parsed.data && parsed.data.conversation) {
        const id = parsed.data.conversation.id;
        if (id) setConvId(id);
      }
    });

    function setConvId(id) {
      if (convId) return;
      convId = String(id);
      document.getElementById('convinfo').innerText = 'Conversa #' + convId;
      document.getElementById('btn').disabled = false;
      checkStatus();
    }

    async function checkStatus() {
      if (!convId) return;
      try {
        const res = await fetch('https://n8n.iphoneriamaracanau.com.br/webhook/check-bot-status?conversation_id=' + convId);
        const data = await res.json();
        pausado = data.pausado;
        updateUI();
      } catch(e) {
        document.getElementById('status').innerText = '⚠️ Erro ao verificar status';
      }
    }

    function updateUI() {
      const btn = document.getElementById('btn');
      const status = document.getElementById('status');
      if (pausado) {
        btn.className = 'retomar';
        btn.innerText = '▶️ Retomar Bot';
        status.innerText = '🔴 Bot está PAUSADO';
      } else {
        btn.className = 'pausar';
        btn.innerText = '⏸️ Pausar Bot';
        status.innerText = '🟢 Bot está ATIVO';
      }
    }

    async function toggleBot() {
      if (!convId) {
        document.getElementById('status').innerText = '❌ ID não encontrado';
        return;
      }
      const btn = document.getElementById('btn');
      const loader = document.getElementById('loader');
      btn.disabled = true;
      loader.style.display = 'block';
      try {
        const res = await fetch('https://n8n.iphoneriamaracanau.com.br/webhook/toggle-bot', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ conversation_id: convId, pausar: !pausado })
        });
        const data = await res.json();
        if (data.ok) {
          pausado = !pausado;
          updateUI();
        } else {
          document.getElementById('status').innerText = '❌ ' + (data.erro || 'Erro desconhecido');
        }
      } catch(e) {
        document.getElementById('status').innerText = '❌ Erro ao executar';
      }
      btn.disabled = false;
      loader.style.display = 'none';
    }
  </script>
</body>
</html>
