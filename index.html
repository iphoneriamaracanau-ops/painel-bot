<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: Arial, sans-serif;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100vh;
    background: #1a1a2e;
    color: white;
  }
  h3 { margin-bottom: 8px; font-size: 18px; }
  p.sub { color: #aaa; font-size: 12px; margin-bottom: 30px; }
  #btn {
    padding: 14px 40px;
    font-size: 16px;
    border: none;
    border-radius: 12px;
    cursor: pointer;
    font-weight: bold;
    transition: all 0.3s;
    box-shadow: 0 4px 15px rgba(0,0,0,0.3);
  }
  .pausar { background: #e74c3c; color: white; }
  .retomar { background: #2ecc71; color: white; }
  #status { margin-top: 20px; font-size: 13px; color: #bbb; }
  #loader { display: none; margin-top: 15px; color: #aaa; }
</style>
</head>
<body>
  <h3>🤖 Controle do Bot</h3>
  <p class="sub">iPhoneria Maracanaú</p>
  <button id="btn" class="pausar" onclick="toggleBot()">⏸️ Pausar Bot</button>
  <p id="status">🟢 Bot está ativo</p>
  <p id="loader">⏳ Processando...</p>

  <script>
    const params = new URLSearchParams(window.location.search);
    const convId = params.get('conversation_id');
    let pausado = false;

    async function checkStatus() {
      if (!convId) {
        document.getElementById('status').innerText = '⚠️ ID não encontrado';
        return;
      }
      try {
        const res = await fetch('https://iphoneriamaracanau.app.n8n.cloud/webhook/check-bot-status?conversation_id=' + convId);
        const data = await res.json();
        pausado = data.pausado;
        updateUI();
      } catch(e) {
        document.getElementById('status').innerText = '⚠️ Erro ao verificar';
      }
    }

    function updateUI() {
      const btn = document.getElementById('btn');
      const status = document.getElementById('status');
      if (pausado) {
        btn.className = 'retomar';
        btn.innerText = '▶️ Retomar Bot';
        status.innerText = '🔴 Bot está PAUSADO';
      } else {
        btn.className = 'pausar';
        btn.innerText = '⏸️ Pausar Bot';
        status.innerText = '🟢 Bot está ATIVO';
      }
    }

    async function toggleBot() {
      const btn = document.getElementById('btn');
      const loader = document.getElementById('loader');
      btn.disabled = true;
      loader.style.display = 'block';
      try {
        const res = await fetch('https://iphoneriamaracanau.app.n8n.cloud/webhook/toggle-bot', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ conversation_id: convId, pausar: !pausado })
        });
        const data = await res.json();
        if (data.ok) {
          pausado = !pausado;
          updateUI();
        }
      } catch(e) {
        document.getElementById('status').innerText = '❌ Erro ao executar';
      }
      btn.disabled = false;
      loader.style.display = 'none';
    }

    checkStatus();
  </script>
</body>
</html>
