<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: Arial, sans-serif;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100vh;
    background: #1a1a2e;
    color: white;
  }
  h3 { margin-bottom: 8px; font-size: 18px; }
  p.sub { color: #aaa; font-size: 12px; margin-bottom: 30px; }
  #btn {
    padding: 14px 40px;
    font-size: 16px;
    border: none;
    border-radius: 12px;
    cursor: pointer;
    font-weight: bold;
    transition: all 0.3s;
    box-shadow: 0 4px 15px rgba(0,0,0,0.3);
  }
  .pausar { background: #e74c3c; color: white; }
  .retomar { background: #2ecc71; color: white; }
  #status { margin-top: 20px; font-size: 13px; color: #bbb; }
  #convinfo { margin-top: 8px; font-size: 11px; color: #666; }
  #loader { display: none; margin-top: 15px; color: #aaa; }
</style>
</head>
<body>
  <h3>🤖 Controle do Bot</h3>
  <p class="sub">iPhoneria Maracanaú</p>
  <button id="btn" class="pausar" onclick="toggleBot()">⏸️ Pausar Bot</button>
  <p id="status">⏳ Carregando...</p>
  <p id="convinfo"></p>
  <p id="loader">⏳ Processando...</p>

  <script>
    let convId = null;
    let pausado = false;

    // Método 1: Pegar da URL
    const params = new URLSearchParams(window.location.search);
    const urlConvId = params.get('conversation_id');

    // Verificar se é válido (não é literal {{...}})
    if (urlConvId && !urlConvId.includes('{') && !isNaN(urlConvId)) {
      convId = urlConvId;
      init();
    } else {
      // Método 2: Escutar mensagem do Chatwoot via postMessage
      window.addEventListener('message', function(event) {
        if (event.data && event.data.conversation) {
          convId = event.data.conversation.id;
          init();
        }
        // Formato alternativo do Chatwoot
        if (event.data && event.data.id && !convId) {
          convId = event.data.id;
          init();
        }
      });

      // Método 3: Tentar pegar da URL pai
      try {
        const parentUrl = document.referrer || window.parent.location.href;
        const match = parentUrl.match(/conversation\/(\d+)/);
        if (match) {
          convId = match[1];
          init();
        }
      } catch(e) {}

      // Método 4: Pegar da URL atual (path)
      const pathMatch = window.location.pathname.match(/(\d+)/);
      if (!convId && pathMatch) {
        convId = pathMatch[1];
        init();
      }

      // Timeout — se não encontrou em 3s, mostrar erro
      setTimeout(() => {
        if (!convId) {
          document.getElementById('status').innerText = '⚠️ Conversa não identificada';
          document.getElementById('convinfo').innerText = 'URL: ' + window.location.href;
          document.getElementById('btn').disabled = false;
        }
      }, 3000);
    }

    function init() {
      document.getElementById('convinfo').innerText = 'Conversa #' + convId;
      checkStatus();
    }

    async function checkStatus() {
      if (!convId) return;
      try {
        const res = await fetch('https://iphoneriamaracanau.app.n8n.cloud/webhook/check-bot-status?conversation_id=' + convId);
        const data = await res.json();
        pausado = data.pausado;
        updateUI();
      } catch(e) {
        document.getElementById('status').innerText = '⚠️ Erro ao verificar status';
      }
    }

    function updateUI() {
      const btn = document.getElementById('btn');
      const status = document.getElementById('status');
      if (pausado) {
        btn.className = 'retomar';
        btn.innerText = '▶️ Retomar Bot';
        status.innerText = '🔴 Bot está PAUSADO';
      } else {
        btn.className = 'pausar';
        btn.innerText = '⏸️ Pausar Bot';
        status.innerText = '🟢 Bot está ATIVO';
      }
    }

    async function toggleBot() {
      if (!convId) {
        document.getElementById('status').innerText = '❌ ID da conversa não encontrado';
        return;
      }
      const btn = document.getElementById('btn');
      const loader = document.getElementById('loader');
      btn.disabled = true;
      loader.style.display = 'block';
      try {
        const res = await fetch('https://iphoneriamaracanau.app.n8n.cloud/webhook/toggle-bot', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ conversation_id: convId, pausar: !pausado })
        });
        const data = await res.json();
        if (data.ok) {
          pausado = !pausado;
          updateUI();
        } else {
          document.getElementById('status').innerText = '❌ Erro: ' + (data.erro || 'desconhecido');
        }
      } catch(e) {
        document.getElementById('status').innerText = '❌ Erro ao executar';
      }
      btn.disabled = false;
      loader.style.display = 'none';
    }
  </script>
</body>
</html>
